<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Discover delicious recipes and cooking inspiration.">
        <meta name="author" content="Casey Heyrend">
    <title>RecipeBook</title>

        <!-- Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Recipe Book">
        <meta property="og:description" content="Discover delicious recipes and cooking inspiration.">
        <meta property="og:url" content="https://caseyheyrend.github.io/wdd131/recipes/">
        <meta property="og:image" content="images/social-preview-image.png">

        <!-- X (Twitter) Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Recipe Book">
        <meta name="twitter:description" content="Discover delicious recipes and cooking inspiration.">
        <meta name="twitter:image" content="images/social-preview-image.png">

        <!-- Icons -->
        <link rel="icon" href="images/favicon.ico">
        <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

        <link rel="stylesheet" href="recipes.css">
        <script src="recipes.js" defer></script>
    </head>
    <body>

        <header>
            <div class="logo">
                <img src="images/recipe-book.png" alt="Recipe Book Logo">
            <h1>Recipe Book</h1>
            </div>
        </header>
        <main>
            <form class="search">
                <input type="text" id="search" placeholder="Find a recipe">
                <button type="submit">
                    <img src="images/search.svg" alt="Search">
                </button>
            </form>
            <hr>
            <div class="recipe-container"></div>
            <article class="recipe-card">
                <img src="images/apple-crisp.jpg" alt="Apple Crisp">

                <div class="recipe-info">
                <p class="tag">dessert</p>

                <h2>Apple Crisp</h2>

                    <span
                    class="rating"
                    role="img"
                    aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">☆</span>
                </span>

                <p class="description">
                    This apple crisp recipe is a simple and delicious fall 
                    dessert that's great served warm with vanilla ice cream.
                    
                </p>
            </div>
        </article>
    </main>

    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>
    </footer>

</body>
</html>
