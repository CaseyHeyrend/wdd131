<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Camping Trip Planner - Organize your camping trips with ease.">
    <meta name="author" content="Casey Heyrend">

  <title>Camping Trip Planner</title>

    <link rel="icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <link rel="stylesheet" href="styles.css">
  <script type="module" src="index.js"></script>

  </head>

  <body>
    <header>

      <img src="images/logo.png" alt="Camping Trip Planner logo">

    <h1>Camping Trip Planner</h1>

      <nav>
      <a href="index.html">Home</a>
      <a href="addtrip.html">Add Trip</a>
      <a href="site-plan.html">Site Plan</a>
      </nav>

    <button id="darkMode">🌙</button>

    </header>

    <main>

      <section class="hero">
        <img src="images/tentinthewoods.jpg" alt="Tent in the woods"><!--Vitali Adutskevich-->

        <div class="hero-text">
        <h2>Your Next Adventure</h2>
        <p>Organize every camping list & trip in one place.</p>
        </div>

      </section>
      <div class="search">
      <label for="search" class="sr-only">Search trips</label>
        <input type="text" id="search" placeholder="Search trips">
        <button type="button" aria-label="Search trips">
          <img src="images/search.svg" alt="Search">
        </button>
      </div>
      <button id="addTripButton" aria-label="Add a new camping trip">
        <img src="images/plus.svg" alt="Add Trip">
      </button>




      <section class="trip-container" aria-label="List of camping trips">

      </section>


      <div id="tripModal" class="modal">
        <div class="modal-content">
        <button id="closeModal" aria-label="Close add trip form">&times;</button>

        <h2>Add Trip</h2>

          <form id="tripForm">

            <div class="field full">
            <label for="tripName">Trip Name</label>
              <input type="text" id="tripName" required>
            </div>

            <div class="field full">
            <label for="destination">Destination</label>
              <select id="destination" required>
              <option value="">Choose one</option>
              <option value="yellowstone">Yellowstone National Park</option>
              <option value="grandTeton">Teton Valley</option>
              <option value="uintaMountains">Uinta Mountains</option>
              <option value="bearLake">Bear Lake</option>
              <option value="glacier">Glacier National Park</option>
              <option value="zion">Zion National Park</option>
              <option value="bryceCanyon">Bryce Canyon National Park</option>
              <option value="craterLake">Crater Lake National Park</option>
              <option value="sawtoothMountains">Sawtooth National Recreation Area</option>
              <option value="arches">Arches National Park</option>
              <option value="redfishLake">Redfish Lake</option>
              <option value="yosemite">Yosemite National Park</option>
              <option value="islandPark">Island Park</option>
              <option value="palisades">Palisades Reservoir</option>
              <option value="mesaFalls">Mesa Falls Scenic Area</option>
              <option value="cratersOfTheMoon">Craters of the Moon National Monument</option>
              <option value="henrysLake">Henrys Lake State Park</option>
              <option value="cityOfRocks">City of Rocks National Reserve</option>
              <option value="jennyLake">Jenny Lake</option>
              <option value="lavaHotSprings">Lava Hot Springs</option>
              </select>
            </div>

            <div class="field">
            <label for="startDate">Start Date</label>
              <input type="date" id="startDate">
            </div>

            <div class="field">
            <label for="endDate">End Date</label>
              <input type="date" id="endDate">
            </div>

            <div class="field">
            <label for="campers">Campers</label>
              <input type="number" id="campers">
            </div>

            <div class="field full">
            <label for="campType">Camping Type</label>
              <select id="campType">
              <option value="">Choose One</option>
              <option value="Tent">Tent</option>
              <option value="RV">RV</option>
              <option value="Cabin">Cabin</option>
              </select>
            </div>

          <button class="full" type="submit">Add Trip</button>

          </form>
        </div>
      </div>
    </main>

    <footer>

    <p>&copy; 2026 Casey Heyrend | WDD 131</p>
    </footer>

  </body>
</html>
