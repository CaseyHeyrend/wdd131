<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Camping Trip Planner - Organize your camping trips with ease.">
        <meta name="author" content="Casey Heyrend">

    <title>Camping Trip Planner</title>

        <link rel="icon" href="images/favicon.ico">

        <link rel="stylesheet" href="styles.css">
    <script type="module" src="index.js" defer></script>

    </head>

    <body>
        <header>

            <img src="images/logo.png" alt="Camping Trip Planner logo">

        <h1>Camping Trip Planner</h1>

            <nav>
            <a href="index.html">Home</a>
            <a href="addtrip.html">Add Trip</a>
            <a href="site-plan.html">Site Plan</a>
            </nav>

        <button id="darkMode">🌙</button>

        </header>

        <main>

            <section class="hero">

                <img src="images/pexels-mazinomron-36696293.jpg"
                alt="Tent in the mountains">

                <div class="hero-text">
                <h2>Your Next Adventure</h2>
                <p>Organize every camping list & trip in one place.</p>
                </div>

            </section>
            <form class="search">
            <label for="search" class="sr-only">Search trips</label>
                <input type="text" id="search" placeholder="Search trips">
                <button type="submit" aria-label="Search trips">
                    <img src="images/search.svg" alt="Search">
                </button></form>
                <button id="addTripButton">
                    <img src="images/plus.svg" alt="Add Trip">
                </button>
            



            <section class="trip-container">

            </section>


            <div id="tripModal" class="modal">

                <div class="modal-content">

                <span id="closeModal">&times;</span>

                <h2>Add Trip</h2>

                    <form id="tripForm">

                    <label>Trip Name</label>
                        <input id="tripName" required>

                    <label>Destination</label>
                        <input id="destination" required>

                    <label>Start Date</label>
                        <input type="date" id="startDate">

                    <label>Campers</label>
                        <input type="number" id="campers">

                    <label>Camping Type</label>

                        <select id="campType">
                        <option>Tent</option>
                        <option>RV</option>
                        <option>Cabin</option>
                        </select>

                        <button type="submit">
                            Add Trip
                        </button>

                    </form>
                </div>
            </main>

            <footer>

            <p>&copy; 2026 Casey Heyrend | WDD 131</p>

            </footer>

        </body>
    </html>
