<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Add a camping trip to your planner.">
<meta name="author" content="Casey Heyrend">

<title>Add Trip</title>
<link rel="icon" href="images/favicon.ico">

<link rel="stylesheet"href="styles.css">
<script src="script.js"defer></script>

</head>

<body>

<header>

<img src="images/camplogo.png"
     alt="Camping Trip Planner logo">

<h1>Camping Trip Planner</h1>

<nav>

<a href="index.html">Home</a>

<a href="addtrip.html">Add Trip</a>

</nav>

<button id="darkMode">🌙</button>

</header>

<main>

<h2>Add a Camping Trip</h2>

<form id="tripForm">

<label for="tripName">Trip Name</label>

<input
type="text"
id="tripName"
required>

<label for="destination">
Destination
</label>

<input
type="text"
id="destination"
required>

<label for="startDate">
Start Date
</label>

<input
type="date"
id="startDate"
required>

<label for="endDate">
End Date
</label>

<input
type="date"
id="endDate"
required>

<label for="campers">
Number of Campers
</label>

<input
type="number"
id="campers"
min="1"
required>

<label for="campType">
Camping Type
</label>

<select id="campType">

<option>Tent</option>

<option>RV</option>

<option>Cabin</option>

</select>

<label for="notes">

Notes

</label>

<textarea
id="notes"></textarea>

<button type="submit">

Add Trip

</button>

</form>

</main>

<footer>

<p>&copy; 2026 Casey Heyrend | WDD 131</p>

</footer>

</body>
</html>
