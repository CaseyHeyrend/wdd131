<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Social Media Meta Information -->
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A character card built with JavaScript objects.">
    <meta property="og:image" content="images/swamp-beast.jpg">
    <meta property="og:type" content="website">

    <title>Character Card</title>

    <link rel="stylesheet" href="test.css">
    <script src="test.js" defer></script>
</head>
<body>

    <main class="card">
        <img id="character-image" src="images/swamp-beast.jpg" alt="Swamp Beast Diplomat">

        <h1 id="name"></h1>

        <p><strong>Class:</strong> <span id="class"></span></p>
        <p><strong>Level:</strong> <span id="level"></span></p>
        <p><strong>Health:</strong> <span id="health"></span></p>

        <div class="buttons">
            <button id="attack-btn">Attack</button>
            <button id="levelup-btn">Level Up</button>
        </div>

        <p id="message"></p>
    </main>

</body>
</html>
