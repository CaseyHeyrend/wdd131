<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Index page for the Cool Pics section of the WDD 131 course.">
    <meta name="author" content="Casey Heyrend">
  <title>Event Ticket</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="test.css">
  <script src="test.js" defer></script>
  </head>
  <body>
    <main class="wrapper">
    <h1>Event Ticket</h1>

      <form id="ticketForm">
        <div class="field">
        <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required />
        </div>

        <div class="field">
        <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required />
        </div>

        <div class="field full">
        <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="field">
        <label for="travelRange">Type</label>
          <select
          id="travelRange"
          name="travelRange"
          aria-controls="notesContainer"
          required
          >
        <option value="">Choose one</option>
        <option value="one">Student</option>
        <option value="many">Guest</option>
        </select>
      </div>

      <div class="field">
      <label for="availableDate">Event Date</label>
        <input id="availableDate" name="availableDate" type="date" required />
      </div>
      <div id="studentContainer" class="field full" hidden>
      <label for="studentId">Student ID</label>
        <input id="studentId" name="studentId" type="text" />
      </div>
      <div id="accessContainer" class="field full" hidden>
      <label for="access">Access Code</label>
        <input id="access" name="access" type="text" />
      </div>

    <button class="full" type="submit">Submit Preferences</button>
    </form>

  <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
