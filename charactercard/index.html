<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A character card for a web development project">
        <meta name="author" content="Casey Heyrend">
        <!-- Social Media Meta Information -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Character Card">
        <meta property="og:description" content="A character card built with JavaScript objects.">
        <meta property="og:url" content="https://caseyheyrend.github.io/wdd131/charactercard/">
        <meta property="og:image" content="https://caseyheyrend.github.io/wdd131/charactercard/images/wolf-warrior.jpg">
        <meta property="og:image:alt" content="A wolf warrior">
        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Character Card">
        <meta name="twitter:description" content="A character card built with JavaScript objects.">
        <meta name="twitter:image" content="https://caseyheyrend.github.io/wdd131/charactercard/images/wolf-warrior.jpg">

        <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="/favicon.ico">

        <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <title>Character Card</title>
        <link rel="stylesheet" href="card.css">
    <script src="card.js" defer></script>
    </head>
    <body>
        <main class="card">
            <img id="character-image" src="images/wolf-warrior.jpg" alt="A wolf warrior">

        <h1 id="name"></h1>
            <div class="stats">
                <p><strong>Class:</strong> <span id="class"></span></p>
                <p><strong>Level:</strong> <span id="level"></span></p>
                <p><strong>Health:</strong> <span id="health"></span></p>
            </div>

            <div class="buttons">
                <button id="attack-but">Attack</button>
                <button id="level-but">Level Up</button>
            </div>
        <p id="message"></p>

        </main>

    </body>
</html>
